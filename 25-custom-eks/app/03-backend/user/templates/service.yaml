# Adding service for user
# We are taking ClusterIP service as this communicate with internal POD's only
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
  labels:
    tier: backend
    project: roboshop
    component: user

spec:
  selector:
    # selecting user pod based on the below labels and add to the service
    tier: backend
    project: roboshop
    component: user
  ports:
    - protocol: TCP
      port: 8080          # service port
      targetPort: 8080    # container port