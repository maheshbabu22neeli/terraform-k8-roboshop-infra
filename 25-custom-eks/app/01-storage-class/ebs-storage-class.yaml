# SC is admin task
# Without a StorageClass, administrators must manually create PersistentVolumes (PVs) before developers can claim them.
# With a StorageClass, the PV is created automatically when a PersistentVolumeClaim (PVC) is created,
# simplifying the process for developers and ensuring that storage resources are provisioned efficiently.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: roboshop-ebs
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
